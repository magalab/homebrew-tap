name: brew audit (casks + formulae)

on:
  push:
    paths:
      - 'Casks/**'
      - 'Formula/**'
  pull_request:

jobs:
  audit-casks:
    name: Audit casks
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Audit casks
        run: |
          shopt -s nullglob
          casks=(Casks/*.rb)
          if [ ${#casks[@]} -eq 0 ]; then
            echo "No casks to audit"
            exit 0
          fi

          for cask in "${casks[@]}"; do
            cask_name="$(basename "$cask" .rb)"
            echo "::group::Auditing $cask"
            brew audit --cask --strict "$cask_name"
            echo "::endgroup::"
          done

  audit-formulae:
    name: Audit formulae
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Audit formulae
        run: |
          shopt -s nullglob
          formulae=(Formula/*.rb)
          if [ ${#formulae[@]} -eq 0 ]; then
            echo "No formulae to audit"
            exit 0
          fi

          for formula in "${formulae[@]}"; do
            formula_name="$(basename "$formula" .rb)"
            echo "::group::Auditing $formula"
            brew audit --strict "$formula_name"
            echo "::endgroup::"
          done
